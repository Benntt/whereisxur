name: Update Xur Inventory

on:
  workflow_dispatch:
  schedule:
    - cron: "17 17 * * FRI"   # Fridays 17:17 UTC; adjust as needed

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build JSON (OAuth)
        env:
          BUNGIE_CLIENT_ID: ${{ secrets.BUNGIE_CLIENT_ID }}
          BUNGIE_CLIENT_SECRET: ${{ secrets.BUNGIE_CLIENT_SECRET }}
          BUNGIE_REFRESH_TOKEN: ${{ secrets.BUNGIE_REFRESH_TOKEN }}
          # Optional; can be empty
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: npm run build

      - name: Commit JSON
        run: |
          mkdir -p data
          git config user.name "xur-bot"
          git config user.email "xur-bot@users.noreply.github.com"
          git add data/xur_inventory.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update xur_inventory.json"
            git push
          fi
